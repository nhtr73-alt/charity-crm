{% extends "base.html" %}

{% block title %}Settings - True Butterflies Foundation{% endblock %}

{% block content %}
<div class="settings-page">
    <h1>Email Settings</h1>

    <div class="alert alert-info">
        <strong>Mailjet:</strong> SMTP: in-v3.mailjet.com | Port: 587 | TLS: enabled
    </div>

    <div class="card">
        <div class="card-body">
            <form method="POST">
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="smtp_server" class="form-label">SMTP Server</label>
                            <input type="text" class="form-control" id="smtp_server" name="smtp_server" value="{{ smtp.smtp_server or '' }}">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="smtp_port" class="form-label">Port</label>
                            <input type="number" class="form-control" id="smtp_port" name="smtp_port" value="{{ smtp.smtp_port or 587 }}">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="smtp_username" class="form-label">Username / Email</label>
                            <input type="text" class="form-control" id="smtp_username" name="smtp_username" value="{{ smtp.smtp_username or '' }}">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="smtp_password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="smtp_password" name="smtp_password" value="{{ smtp.smtp_password or '' }}">
                        </div>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="smtp_from_email" class="form-label">From Email</label>
                    <input type="email" class="form-control" id="smtp_from_email" name="smtp_from_email" value="{{ smtp.smtp_from_email or '' }}">
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="use_tls" name="use_tls" value="1" {% if smtp.use_tls != False %}checked{% endif %}>
                    <label class="form-check-label" for="use_tls">Use TLS</label>
                </div>
                <button type="submit" class="btn btn-primary">Save Settings</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
