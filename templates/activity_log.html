{% extends "base.html" %}

{% block title %}Activity Log - True Butterflies Foundation{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Activity Log</h1>
</div>

<div class="card">
    <div class="card-body">
        <table class="table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Action</th>
                    <th>Details</th>
                </tr>
            </thead>
            <tbody>
                {% for log in logs %}
                <tr>
                    <td>{{ log.created_at.strftime('%Y-%m-%d %H:%M') }}</td>
                    <td>{{ log.action }}</td>
                    <td>{{ log.details or '-' }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
