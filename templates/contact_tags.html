{% extends "base.html" %}

{% block title %}Tags - {{ contact.full_name }}{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Tags for {{ contact.full_name }}</h1>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                {% for tag in all_tags %}
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="tags" value="{{ tag.id }}" id="tag{{ tag.id }}" {% if tag.id in contact_tags %}checked{% endif %}>
                    <label class="form-check-label" for="tag{{ tag.id }}">
                        <span class="badge bg-{{ tag.color }}">{{ tag.name }}</span>
                    </label>
                </div>
                {% endfor %}
            </div>
            <button type="submit" class="btn btn-primary">Save Tags</button>
            <a href="{{ url_for('contact_detail', contact_id=contact.id) }}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
